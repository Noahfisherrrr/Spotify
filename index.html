    <header>
        <nav class="nav-bar">

            <a class="nav-link" href="#">

            <div class="filtered-item" id="filter-item">

            <div class="filtered-item" id="filter-item">

            <div class="filtered-item" id="filter-item">

            </div>

                <div class="filtered-item-info">
                    <span class="filtered-item-title">Rock mix</span>
                    <span class="filtered-item-artist">Spotify</span>
